<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lancheria</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  🍔 Lancheria
</header>

<!-- CARDÁPIO -->
<div id="tela-cardapio">
  <div id="produtos"></div>
</div>

<!-- CARRINHO -->
<div id="tela-carrinho" class="hidden">
  <h2 style="padding:15px;">🛒 Seu Pedido</h2>
  <ul id="carrinho"></ul>
  <p class="total" id="total">Total: R$ 0</p>
  <button class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>
</div>

<!-- 🔥 BARRA INFERIOR -->
<div class="bottom-bar">
  <button onclick="mostrarCardapio()">🍔<br>Cardápio</button>
  <button onclick="mostrarCarrinho()">
    🛒<br>Carrinho <span id="badge">0</span>
  </button>
</div>

<script src="script.js"></script>
</body>
</html>
